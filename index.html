<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Panel - اطلب خدماتك</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff4b2b;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        .footer-text { margin-top: 20px; font-size: 12px; opacity: 0.6; }
        #msg { margin-top: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 رشق متابعين إنستغرام</h1>
    <p>أدخل بياناتك للحصول على المتابعين مجاناً</p>

    <input type="text" id="user" placeholder="اسم المستخدم (Username)" required>
    
    <select id="service">
        <option value="1000 متابع">1000 متابع (مجاني)</option>
        <option value="5000 متابع">5000 متابع (مجاني)</option>
        <option value="10000 متابع">10000 متابع (مجاني)</option>
    </select>

    <button onclick="sendToTelegram()">تأكيد الطلب</button>

    <div id="msg">✅ تم إرسال الطلب، سيتم التنفيذ خلال 24 ساعة.</div>
    
    <div class="footer-text">نظام آمن 100% لتطوير الحسابات</div>
</div>

<script>
    function sendToTelegram() {
        // البيانات الخاصة بك
        const token = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";

        const username = document.getElementById('user').value;
        const service = document.getElementById('service').value;
        const msgDiv = document.getElementById('msg');

        if (username.trim() === "") {
            alert("الرجاء إدخال اسم المستخدم");
            return;
        }

        // صياغة الرسالة
        const text = `⚠️ *طلب رشق جديد* \n\n👤 اليوزر: ${username} \n📦 الخدمة: ${service}`;

        // رابط API التليجرام
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;

        // إرسال الطلب
        fetch(url)
        .then(res => {
            if (res.ok) {
                msgDiv.style.display = "block";
                msgDiv.style.color = "#4BB543";
                document.getElementById('user').value = "";
            } else {
                alert("خطأ في الاتصال بالخادم");
            }
        })
        .catch(err => {
            console.error(err);
            alert("فشل الإرسال، تحقق من الإنترنت");
        });
    }
</script>

</body>
</html>
